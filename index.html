<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cris Garduño</title>
    <meta name="description" content="I mix science, creativity, and technology to explore how people move and experience the world." />
    <!-- Fonts: Inter + Space Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { 
                sans: ['Inter', 'sans-serif'],
                mono: ['"Space Mono"', 'monospace'],
            },
            colors: {
                sys: {
                    chassis: '#f4f4f0',
                    surface: '#ffffff',
                    ink: '#222222',
                    inkSub: '#666666',
                    border: '#dcdcdc',
                    orange: '#f04e30',
                    green: '#3e8c58',
                    plastic: '#e8e8e5',
                }
            },
            boxShadow: {
                'plastic': '0 2px 0 0 rgba(0,0,0,0.08)',
                'plastic-pressed': 'inset 0 1px 2px rgba(0,0,0,0.1)',
                'screen': 'inset 0 0 0 1px rgba(0,0,0,0.05)',
                'floating': '0 8px 30px -4px rgba(0,0,0,0.08)',
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="styles.css">
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-sys-chassis text-sys-ink font-sans selection:bg-sys-orange selection:text-white flex flex-col min-h-screen">
    
    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 ease-in-out h-[80px] bg-sys-chassis border-b border-transparent">
      <div class="w-full max-w-[1200px] mx-auto px-6 h-full flex items-center justify-between">
        <!-- Logo -->
        <a href="#home" class="group flex flex-col justify-center z-50 relative" onclick="closeMobileMenu()">
          <span class="text-lg font-bold uppercase tracking-tighter text-sys-ink group-hover:text-sys-orange transition-colors">
            Garduño<span class="font-normal text-xs text-sys-inkSub ml-0.5 font-mono">.cris</span>
          </span>
        </a>
        
        <!-- Desktop Menu -->
        <ul class="hidden md:flex gap-4 list-none m-0 p-0">
          <li><a href="#home" class="nav-link btn-plastic flex items-center gap-2 px-5 py-2 text-xs font-bold font-mono uppercase tracking-widest text-sys-inkSub">Home</a></li>
          <li><a href="#research" class="nav-link btn-plastic flex items-center gap-2 px-5 py-2 text-xs font-bold font-mono uppercase tracking-widest text-sys-inkSub">Research</a></li>
          <li><a href="#projects" class="nav-link btn-plastic flex items-center gap-2 px-5 py-2 text-xs font-bold font-mono uppercase tracking-widest text-sys-inkSub">Stuff & Things</a></li>
        </ul>

        <!-- Mobile Hamburger -->
        <button id="mobile-menu-btn" class="md:hidden z-50 p-2 text-sys-ink hover:text-sys-orange transition-colors" aria-label="Toggle menu">
            <svg id="icon-menu" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            <svg id="icon-close" class="hidden" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 bg-sys-chassis/98 backdrop-blur-md z-40 transition-transform duration-300 ease-in-out md:hidden flex items-center justify-center -translate-y-full">
      <ul class="flex flex-col gap-6 text-center">
          <li><a href="#home" onclick="closeMobileMenu()" class="text-xl font-bold font-mono uppercase tracking-widest hover:text-sys-orange transition-colors text-sys-ink">Home</a></li>
          <li><a href="#research" onclick="closeMobileMenu()" class="text-xl font-bold font-mono uppercase tracking-widest hover:text-sys-orange transition-colors text-sys-ink">Research</a></li>
          <li><a href="#projects" onclick="closeMobileMenu()" class="text-xl font-bold font-mono uppercase tracking-widest hover:text-sys-orange transition-colors text-sys-ink">Stuff & Things</a></li>
      </ul>
    </div>

    <!-- Main Content Area -->
    <main id="app" class="flex-grow pt-[80px] w-full"></main>

    <!-- Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-[2000] bg-sys-ink/20 backdrop-blur-sm flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <!-- Modal content injected by JS -->
    </div>

    <!-- Footer -->
    <footer class="mt-20 py-8 bg-sys-chassis border-t border-sys-border">
      <div class="max-w-[1200px] mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex flex-col md:flex-row items-center gap-2 text-[10px] font-mono text-sys-inkSub uppercase tracking-widest text-center md:text-left">
            <span>&copy; <span id="year"></span> Cris Garduño</span>
            <span class="hidden md:inline text-sys-border">|</span>
            
            <div class="flex flex-col md:flex-row gap-1 md:gap-2 items-center">
                <span>All Systems Functional</span>
                <span class="hidden md:inline text-sys-border">|</span>
                <span>
                  Inspired by <a href="https://en.wikipedia.org/wiki/Dieter_Rams" target="_blank" rel="noopener noreferrer" class="hover:text-sys-orange transition-colors underline decoration-sys-border underline-offset-2 hover:decoration-sys-orange">Dieter Rams</a>
                </span>
            </div>
        </div>
        
        <a href="https://linkedin.com/in/cris-garduno" target="_blank" rel="noopener noreferrer" class="btn-plastic px-3 py-1 flex items-center gap-2 text-[10px] font-bold font-mono uppercase tracking-widest text-sys-inkSub hover:text-sys-orange">
          LinkedIn Connection
          <svg width="12" height="12" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 0H4C1.8 0 0 1.8 0 4v12c0 2.2 1.8 4 4 4h12c2.2 0 4-1.8 4-4V4c0-2.2-1.8-4-4-4zM6 17H3V8h3v9zM4.5 6.3c-1 0-1.8-.8-1.8-1.8s.8-1.8 1.8-1.8 1.8.8 1.8 1.8-.8 1.8-1.8 1.8zM17 17h-3v-4.4c0-1.1 0-2.5-1.5-2.5s-1.7 1.2-1.7 2.4V17H8V8h2.9v1.2h.04c.4-.8 1.4-1.6 2.9-1.6 3.1 0 3.7 2 3.7 4.6V17z" fill="currentColor"/></svg>
        </a>
      </div>
    </footer>

    <script src="script.js"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
