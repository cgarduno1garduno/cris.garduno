<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stuff & Things - Personal Website</title>
    <meta name="description" content="A collection of side projects, experiments, and creative endeavors">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav" id="topNav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Cris Garduño</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="projects.html" class="nav-link active">Stuff & Things</a></li>
                <li><a href="research.html" class="nav-link">Research</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content projects-page">
        <!-- Page Header -->
        <section class="page-header-section">
            <div class="content-container">
                <h1 class="page-title">Stuff & Things</h1>
                <p class="page-description">Where side projects, curios, and questionable ideas live (or die)</p>
            </div>
        </section>

        <!-- Search Section -->
        <section class="search-section">
            <div class="content-container">
                <div class="search-container">
                    <input 
                        type="search" 
                        id="projectSearch" 
                        placeholder="Search projects by title, topic, or tags..."
                        aria-label="Search projects"
                        class="search-input"
                    >
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
                        <path d="14 14L18 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </section>

        <!-- Projects Grid -->
        <section class="projects-section">
            <div class="content-container">
                <div class="projects-grid" id="projectsGrid">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </section>

        <!-- Project Detail Modal -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-content" id="modalContent">
                <button class="modal-close" id="modalClose" aria-label="Close project details">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="modal-body" id="modalBody">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="content-container">
            <p>&copy; 2025 Cris Garduño All rights reserved.</p>
            <a href="https://linkedin.com/in/cris-garduno" class="social-link" aria-label="LinkedIn Profile">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 0H4C1.8 0 0 1.8 0 4v12c0 2.2 1.8 4 4 4h12c2.2 0 4-1.8 4-4V4c0-2.2-1.8-4-4-4zM6 17H3V8h3v9zM4.5 6.3c-1 0-1.8-.8-1.8-1.8s.8-1.8 1.8-1.8 1.8.8 1.8 1.8-.8 1.8-1.8 1.8zM17 17h-3v-4.4c0-1.1 0-2.5-1.5-2.5s-1.7 1.2-1.7 2.4V17H8V8h2.9v1.2h.04c.4-.8 1.4-1.6 2.9-1.6 3.1 0 3.7 2 3.7 4.6V17z" fill="currentColor"/>
                </svg>
            </a>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
